<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Digital Connect | Elevated networking via smart digital business cards." />
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="https://plus.unsplash.com/premium_photo-1661386241088-2edee49d5bf5?auto=format&fit=crop&q=80&w=192&h=192" />
    <title>Digital Business Profile</title>
  </head>
  <body>
    <!-- Google Translate Element -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,ar,es,fr,de', autoDisplay: false}, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <!-- React DOM Google Translate Patch -->
    <script type="text/javascript">
      if (typeof Node === 'function' && Node.prototype) {
        const originalRemoveChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child.parentNode !== this) {
            if (console) {
              console.warn('Cannot remove a child from a different parent', child, this);
            }
            return child;
          }
          return originalRemoveChild.apply(this, arguments);
        };
        const originalInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, referenceNode) {
          if (referenceNode && referenceNode.parentNode !== this) {
            if (console) {
              console.warn('Cannot insert before a reference node from a different parent', referenceNode, this);
            }
            return newNode;
          }
          return originalInsertBefore.apply(this, arguments);
        };
      }
    </script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
